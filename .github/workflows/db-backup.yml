name: Backup database Supabase

# Backup automatico e GRATUITO del database Supabase.
# - Gira ogni giorno alle 02:30 UTC (04:30 in Italia) + on-demand dal tab Actions.
# - pg_dump completo -> gzip -> cifratura GPG (il repo e' PUBBLICO e i dati
#   contengono dati personali dei soci, quindi il dump NON deve mai essere
#   leggibile in chiaro).
# - Il file cifrato viene salvato come "artifact" del workflow, conservato 90
#   giorni. Scaricabile solo dai collaboratori del repo, e comunque cifrato.
#
# SEGRETI DA IMPOSTARE (Settings -> Secrets and variables -> Actions):
#   SUPABASE_DB_URL    = la connection string "Session pooler" da Supabase
#                        (Dashboard -> Connect -> URI). Es:
#                        postgresql://postgres.uywtfwjkyiacdfgsbtgo:PASSWORD@aws-0-...pooler.supabase.com:5432/postgres
#   BACKUP_PASSPHRASE  = una password lunga a tua scelta per cifrare/decifrare i dump
#
# PER RIPRISTINARE un backup:
#   gpg --batch --yes --passphrase 'LA_TUA_PASSPHRASE' -d backup.sql.gz.gpg | gunzip > backup.sql
#   psql "SUPABASE_DB_URL" < backup.sql

on:
  schedule:
    - cron: '30 2 * * *'   # ogni giorno 02:30 UTC
  workflow_dispatch: {}     # pulsante "Run workflow" manuale

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Installa client PostgreSQL 17
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          sudo sh -c 'echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Esegui dump + cifratura
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          STAMP=$(date -u +%Y-%m-%d_%H%M)
          FILE="digitalions_db_${STAMP}.sql.gz.gpg"
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" \
            --no-owner --no-privileges \
            | gzip \
            | gpg --batch --yes --symmetric --cipher-algo AES256 \
                  --passphrase "$PASSPHRASE" -o "$FILE"
          echo "Creato $FILE ($(du -h "$FILE" | cut -f1))"
          echo "ARTIFACT_NAME=$FILE" >> "$GITHUB_ENV"

      - name: Carica backup cifrato come artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 90
